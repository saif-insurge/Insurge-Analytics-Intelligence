# Cloud Build config for the worker container.
# Triggered automatically by GitHub push to main; can also be run manually:
#   gcloud builds submit --config=cloudbuild.worker.yaml --region=europe-west1
steps:
  # 1. Build and tag the image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:$BUILD_ID'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:latest'
      - '-f'
      - 'apps/worker/Dockerfile'
      - '.'

  # 2. Push BOTH tags explicitly. The `images:` block at the bottom of this
  # file would push at the END of the build, but our deploy step needs the
  # image in the registry RIGHT NOW.
  - name: 'gcr.io/cloud-builders/docker'
    id: push-build-id
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:$BUILD_ID']
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:latest']

  # 3. Roll the new image out to Cloud Run as a new revision.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'insurge-analytics-intel-audit-runner'
      - '--region=europe-west1'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:$BUILD_ID'

# Declared for Cloud Build UI to show "this build produced these images".
# Already pushed in step 2 above; this is a no-op verify.
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:$BUILD_ID'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/insurge-analytics/worker:latest'

options:
  logging: CLOUD_LOGGING_ONLY
timeout: '1800s'
